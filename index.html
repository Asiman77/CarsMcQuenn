<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarsMcQuenn - Highway Rush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="overlay">
        <h1>CARS MCQUEEN</h1>
        <p>High Score: <span id="start-high-score">0</span></p>

        <div class="selection-container">
            <h3>CHOOSE YOUR CAR:</h3>
            <div class="car-options">
                <div class="car-option selected" data-region="catalan">
                    <div class="mini-car catalan-skin"></div>
                    <span>Catalan</span>
                </div>
                <div class="car-option" data-region="basque">
                    <div class="mini-car basque-skin"></div>
                    <span>Basque</span>
                </div>
                <div class="car-option" data-region="spanish">
                    <div class="mini-car spanish-skin"></div>
                    <span>Spanish</span>
                </div>
            </div>
        </div>

        <button id="start-btn">START GAME</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1>GAME OVER</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart-btn">RETRY</button>
    </div>

    <div id="hud">
        SCORE: <span id="score">0</span>
    </div>

    <div id="road">
        <div id="player" class="car"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
